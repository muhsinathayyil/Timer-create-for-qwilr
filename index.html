<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opus Proposal Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .wrap {
      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: 2.5rem 2rem;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      background: #ffffff;
    }
    .top-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .units {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .num {
      font-size: 56px;
      font-weight: 600;
      line-height: 1;
      color: #111;
      background: #f5f5f5;
      border-radius: 10px;
      width: 88px;
      padding: 14px 0;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }
    .lbl {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
    }
    .sep {
      font-size: 48px;
      font-weight: 300;
      color: #ccc;
      line-height: 1;
      padding-top: 14px;
    }
    .bar-wrap {
      height: 4px;
      background: #eee;
      border-radius: 2px;
      max-width: 360px;
      margin: 0 auto 1.5rem;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 2px;
      background: #111;
      transition: width 1s linear;
      width: 0%;
    }
    .footer {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
    }
    .footer strong {
      color: #111;
      font-weight: 600;
    }
    .expired {
      font-size: 20px;
      font-weight: 600;
      color: #c0392b;
      padding: 1rem 0;
    }
    @media (max-width: 480px) {
      .num { font-size: 38px; width: 64px; padding: 10px 0; }
      .sep { font-size: 32px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="top-label">This proposal expires in</div>
  <div class="units" id="units">
    <div class="unit"><div class="num" id="days">--</div><div class="lbl">days</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="num" id="hours">--</div><div class="lbl">hours</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="num" id="mins">--</div><div class="lbl">minutes</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="num" id="secs">--</div><div class="lbl">seconds</div></div>
  </div>
  <div class="bar-wrap"><div class="bar-fill" id="fill"></div></div>
  <div class="footer">
    Pricing and availability guaranteed until <strong id="expiry-display">—</strong>.<br />
    Sign now to lock in your rate and reserve your bootcamp slot.
  </div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const dateParam = params.get('date');
  const SENT_DATE = dateParam ? new Date(dateParam) : new Date();
  const DAYS_VALID = 14;

  const expiry = new Date(SENT_DATE);
  expiry.setDate(expiry.getDate() + DAYS_VALID);
  expiry.setHours(23, 59, 59, 0);

  const totalMs = DAYS_VALID * 24 * 60 * 60 * 1000;

  document.getElementById('expiry-display').textContent = expiry.toLocaleDateString('en-GB', {
    day: '2-digit', month: 'short', year: 'numeric'
  });

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const diff = expiry - Date.now();
    if (diff <= 0) {
      document.getElementById('units').innerHTML = '<div class="expired">This proposal has expired.</div>';
      document.getElementById('fill').style.width = '100%';
      return;
    }
    document.getElementById('days').textContent  = pad(Math.floor(diff / 86400000));
    document.getElementById('hours').textContent = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('mins').textContent  = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('secs').textContent  = pad(Math.floor((diff % 60000) / 1000));
    const elapsed = totalMs - diff;
    document.getElementById('fill').style.width = Math.min(100, (elapsed / totalMs) * 100).toFixed(2) + '%';
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
