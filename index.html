<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opus Proposal Timer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .wrap {
      text-align: center;
      max-width: 560px;
      width: 100%;
      padding: 2.5rem 2rem;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      background: #ffffff;
    }
    .top-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }
    .units {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .num {
      font-size: 56px;
      font-weight: 600;
      line-height: 1;
      color: #111;
      background: #f5f5f5;
      border-radius: 10px;
      width: 88px;
      padding: 14px 0;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
